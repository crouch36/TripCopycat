<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TripCopycat — Instagram Post</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111820;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 28px 16px 48px;
      font-family: 'Inter', sans-serif;
    }

    /* ── Controls ── */
    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 22px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .controls button {
      padding: 10px 22px;
      border-radius: 8px;
      border: none;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: opacity .15s;
    }
    .controls button:hover { opacity: 0.88; }
    .btn-download { background: #FAF7F2; color: #1C2B3A; }
    .btn-copy     { background: #C4A882; color: #1C2B3A; }
    .btn-regen    { background: rgba(255,255,255,0.08); color: #FAF7F2; border: 1px solid rgba(255,255,255,0.18) !important; }

    /* ── Post card — 1:1 square ── */
    .post-wrap {
      width: min(560px, 100vw - 32px);
      aspect-ratio: 1 / 1;
      position: relative;
      border-radius: 3px;
      overflow: hidden;
      box-shadow: 0 32px 80px rgba(0,0,0,0.7);
    }

    .post-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      background-color: #1C2B3A;
    }

    /* Gradient: transparent top, heavy dark bottom */
    .post-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.08) 0%,
        rgba(0,0,0,0.0)  20%,
        rgba(0,0,0,0.45) 55%,
        rgba(0,0,0,0.88) 100%
      );
    }

    /* Content */
    .post-content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 5%;
    }

    /* ── Top bar ── */
    .post-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    /* Verified badge — top left */
    .post-badge {
      background: #C4A882;
      color: #1C2B3A;
      font-family: 'Inter', sans-serif;
      font-size: clamp(7px, 1.5vw, 10px);
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 3px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* Actually Traveled badge */
    .post-actually {
      background: rgba(28,43,58,0.75);
      border: 1.5px solid #C4A882;
      color: #C4A882;
      font-family: 'Inter', sans-serif;
      font-size: clamp(7px, 1.4vw, 10px);
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: 10px;
    }

    /* Logo — top right */
    .post-logo {
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: 'Inter', sans-serif;
      font-size: clamp(12px, 2.4vw, 17px);
      font-weight: 800;
      color: rgba(255,255,255,0.95);
      letter-spacing: 0.02em;
      text-shadow: 0 1px 6px rgba(0,0,0,0.7);
    }
    .post-logo img {
      width: clamp(24px, 4.5vw, 34px);
      height: clamp(24px, 4.5vw, 34px);
      object-fit: contain;
      filter: drop-shadow(0 1px 4px rgba(0,0,0,0.6));
    }

    /* ── Bottom content ── */
    .post-bottom {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* Utility label — "VERIFIED PATH:" */
    .post-label {
      font-family: 'Inter', sans-serif;
      font-size: clamp(8px, 1.7vw, 11px);
      font-weight: 800;
      color: #C4A882;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 3%;
    }

    /* Destination — big bold sans */
    .post-dest {
      font-family: 'DM Sans', 'Inter', sans-serif;
      font-size: clamp(24px, 7vw, 44px);
      font-weight: 800;
      color: #FFFFFF;
      line-height: 1.05;
      text-shadow: 0 2px 16px rgba(0,0,0,0.5);
      letter-spacing: -0.02em;
      margin-bottom: 3%;
    }

    /* Duration / travelers */
    .post-duration {
      font-family: 'Inter', sans-serif;
      font-size: clamp(9px, 2vw, 13px);
      font-weight: 600;
      color: rgba(255,255,255,0.7);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 3%;
    }

    /* Amber rule */
    .post-rule {
      width: 40px;
      height: 3px;
      background: #C4A882;
      margin-bottom: 3%;
      border-radius: 2px;
    }

    /* Quote */
    .post-quote {
      font-family: 'Inter', sans-serif;
      font-size: clamp(10px, 2.2vw, 13px);
      color: rgba(255,255,255,0.88);
      line-height: 1.6;
      font-style: italic;
      max-width: 85%;
      text-shadow: 0 1px 4px rgba(0,0,0,0.4);
      margin-bottom: 3%;
    }

    /* Bottom row: map + restaurants */
    .post-footer {
      display: flex;
      gap: 3%;
      align-items: flex-end;
    }

    /* Static map snippet */
    .post-map-wrap {
      flex-shrink: 0;
      border-radius: 6px;
      overflow: hidden;
      border: 1.5px solid rgba(196,168,130,0.5);
      position: relative;
    }
    .post-map-wrap img {
      display: block;
      width: clamp(80px, 18vw, 110px);
      height: clamp(80px, 18vw, 110px);
      object-fit: cover;
    }
    .post-map-label {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(28,43,58,0.82);
      font-family: 'Inter', sans-serif;
      font-size: clamp(6px, 1.2vw, 8px);
      font-weight: 700;
      color: #C4A882;
      text-align: center;
      padding: 3px 4px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* Restaurants */
    .post-rests {
      display: flex;
      flex-direction: column;
      gap: 5px;
      flex: 1;
    }
    .post-rest-item {
      font-family: 'Inter', sans-serif;
      font-size: clamp(9px, 1.9vw, 12px);
      color: rgba(255,255,255,0.8);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .post-rest-item::before {
      content: "🍽";
      font-size: 0.85em;
    }

    /* ── Caption panel ── */
    .caption-panel {
      margin-top: 20px;
      width: min(560px, 100vw - 32px);
    }
    .caption-label {
      font-size: 10px;
      font-weight: 700;
      color: #C4A882;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .caption-box {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 16px 18px;
    }
    .caption-text {
      font-size: 13px;
      color: rgba(255,255,255,0.82);
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .caption-generating {
      font-size: 12px;
      color: #C4A882;
      font-style: italic;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(196,168,130,0.3);
      border-top-color: #C4A882;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .copy-feedback {
      font-size: 11px;
      color: #7A9E5A;
      margin-top: 8px;
      font-weight: 600;
      display: none;
    }
  </style>
</head>
<body>

<div class="controls">
  <button class="btn-download" onclick="downloadCard()">⬇ Download Image</button>
  <button class="btn-regen" onclick="generateCaption()">✦ Regenerate Caption</button>
</div>

<!-- Post card -->
<div class="post-wrap" id="post-card">
  <div class="post-bg" id="post-bg"></div>
  <div class="post-overlay"></div>
  <div class="post-content">

    <!-- Top bar -->
    <div class="post-top">
      <span class="post-logo" style="background:rgba(0,0,0,0.38);padding:5px 10px;border-radius:10px">
        <img id="logo-img" src="/apple-touch-icon.png" alt="TripCopycat" crossorigin="anonymous" />
        TripCopycat.com
      </span>
      <span class="post-actually">✓ Actually Traveled</span>
    </div>

    <!-- Bottom content -->
    <div class="post-bottom">
      <div class="post-label" id="post-label" style="display:inline-block;background:rgba(0,0,0,0.38);padding:4px 10px;border-radius:8px">VERIFIED PATH</div>
      <div class="post-dest" id="post-dest" style="display:inline-block;background:rgba(0,0,0,0.38);padding:4px 10px;border-radius:10px"></div>
      <div class="post-duration" id="post-duration" style="display:inline-block;background:rgba(0,0,0,0.32);padding:3px 9px;border-radius:8px"></div>
      <div class="post-rule"></div>
      <div class="post-quote" id="post-quote" style="background:rgba(0,0,0,0.38);padding:8px 12px;border-radius:10px"></div>
      <div class="post-footer">
        <div class="post-map-wrap" id="post-map-wrap" style="display:none">
          <img id="post-map-img" src="" alt="Venue map" crossorigin="anonymous" />
          <div class="post-map-label">Get your custom map →</div>
        </div>
        <div class="post-rests" id="post-rests"></div>
      </div>
    </div>

  </div>
</div>

<!-- Caption + First Comment -->
<div class="caption-panel" id="caption-panel">

  <div class="caption-label">Instagram Caption <span style="font-size:9px;color:rgba(196,168,130,0.6);font-weight:400;letter-spacing:0">(3 brand + destination tags — keep it clean)</span></div>
  <div class="caption-box">
    <div class="caption-text" id="caption-text">
      <span class="caption-generating"><span class="spinner"></span>Writing caption with AI…</span>
    </div>
    <div class="copy-feedback" id="copy-feedback">✓ Copied</div>
    <button onclick="copyCaption()" style="margin-top:10px;padding:6px 16px;border-radius:7px;border:1px solid rgba(196,168,130,0.4);background:transparent;color:#C4A882;font-size:11px;font-weight:700;cursor:pointer;font-family:Inter,sans-serif">📋 Copy Caption</button>
  </div>

  <div class="caption-label" style="margin-top:20px">First Comment <span style="font-size:9px;color:rgba(196,168,130,0.6);font-weight:400;letter-spacing:0">(post immediately after — keeps caption clean)</span></div>
  <div class="caption-box">
    <div class="caption-text" id="comment-text">
      <span class="caption-generating"><span class="spinner"></span>Building hashtag stack…</span>
    </div>
    <div class="copy-feedback" id="comment-feedback">✓ Copied</div>
    <button onclick="copyComment()" style="margin-top:10px;padding:6px 16px;border-radius:7px;border:1px solid rgba(196,168,130,0.4);background:transparent;color:#C4A882;font-size:11px;font-weight:700;cursor:pointer;font-family:Inter,sans-serif">📋 Copy First Comment</button>
  </div>

</div>

<script>
  const SUPABASE_URL = "https://wnjxtjeospeblvqdqsdj.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Induanh0amVvc3BlYmx2cWRxc2RqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MTI2MjQsImV4cCI6MjA4OTI4ODYyNH0.l3OHQ9_v5__lkX_AryEkmg2uYGgxnTR4KqViV8foNls";

  // ── Parse params ──────────────────────────────────────────────────────────
  const p        = new URLSearchParams(window.location.search);
  const dest     = p.get("dest")     || "Your Destination";
  const duration = p.get("duration") || "";
  const quote    = p.get("quote")    || "";
  const photo    = p.get("photo")    || "";
  const doNext    = p.get("doNext")    || "";
  const tripId    = p.get("tripId")    || "";
  const mapsKey   = p.get("mapsKey")   || "";
  const geminiKey = p.get("geminiKey") || "";

  // Parse all venues passed from App.jsx
  const allRests = p.get("rests") ? p.get("rests").split("||").filter(Boolean) : [];
  const allBars  = p.get("bars")  ? p.get("bars").split("||").filter(Boolean)  : [];
  const allActs  = p.get("acts")  ? p.get("acts").split("||").filter(Boolean)  : [];
  const allVenues = [...allRests, ...allBars, ...allActs];

  // Smart selection: prefer venues mentioned in the "loves" text
  // This ensures we feature what the user actually highlighted, not just index[0..2]
  const lovesLower = quote.toLowerCase();
  const doNextLower = doNext.toLowerCase();
  const mentioned = allVenues.filter(v => lovesLower.includes(v.toLowerCase()));
  const notPanned  = allRests.filter(v => !doNextLower.includes(v.toLowerCase()));

  let featured = [];
  // First: venues specifically called out in loves
  featured = [...mentioned];
  // Fill remaining slots with restaurants not mentioned in doNext (not panned)
  for (const v of notPanned) {
    if (featured.length >= 3) break;
    if (!featured.includes(v)) featured.push(v);
  }
  // Final fallback: just use first 3 restaurants
  if (!featured.length) featured = allRests.slice(0, 3);
  featured = featured.slice(0, 3);

  const r1 = featured[0] || "";
  const r2 = featured[1] || "";
  const r3 = featured[2] || "";

  // ── Populate card ─────────────────────────────────────────────────────────
  // Destination — uppercase city name only
  const cityOnly = dest.split(",")[0].trim().toUpperCase();
  document.getElementById("post-dest").textContent     = cityOnly;
  document.getElementById("post-duration").textContent = duration;
  document.getElementById("post-label").textContent    = "VERIFIED PATH: " + dest.toUpperCase();
  // Cut at last sentence boundary within 180 chars
const trimQuote = (q, max) => {
  if (q.length <= max) return q;
  // Prefer a sentence boundary
  const cut = q.slice(0, max);
  const sentenceEnd = Math.max(cut.lastIndexOf(". "), cut.lastIndexOf("! "), cut.lastIndexOf("? "));
  if (sentenceEnd > 60) return q.slice(0, sentenceEnd + 1);
  // Otherwise cut at last word boundary and add ellipsis
  const wordEnd = cut.lastIndexOf(" ");
  return (wordEnd > 60 ? cut.slice(0, wordEnd) : cut) + "…";
};
// Use first 2 sentences max — keeps it punchy on the card
const firstTwoSentences = (q) => {
  const matches = q.match(/[^.!?]+[.!?]+/g);
  if (!matches || matches.length < 2) return trimQuote(q, 200);
  return matches.slice(0, 2).join("").trim();
};
document.getElementById("post-quote").textContent = quote ? `"${firstTwoSentences(quote)}"` : "";

  const photoProxied = photo && photo.startsWith("http")
    ? `/api/image?url=${encodeURIComponent(photo)}`
    : photo;

  if (photo) {
    // Use direct URL for display — proxied version used only during download capture
    document.getElementById("post-bg").style.backgroundImage = `url(${JSON.stringify(photo)})`;
  }

  const restsEl = document.getElementById("post-rests");
  const rests = [r1, r2, r3].filter(Boolean);
  rests.forEach(r => {
    const span = document.createElement("span");
    span.className = "post-rest-item";
    span.textContent = r;
    restsEl.appendChild(span);
  });

  // ── Static map via venue_coords ───────────────────────────────────────────
  if (tripId && mapsKey) {
    fetch(`${SUPABASE_URL}/rest/v1/trips?id=eq.${tripId}&select=venue_coords,hotels,restaurants,bars,activities`, {
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
    })
    .then(r => r.json())
    .then(rows => {
      const trip = rows?.[0];
      if (!trip?.venue_coords) return;
      const CAT_COLORS = { hotels:"red", restaurants:"blue", bars:"purple", activities:"green" };
      const markerParams = [];
      for (const [cat, coords] of Object.entries(trip.venue_coords)) {
        const color = CAT_COLORS[cat] || "gray";
        (coords || []).forEach(c => {
          if (c?.lat && c?.lng) markerParams.push(`markers=color:${color}%7C${c.lat},${c.lng}`);
        });
      }
      if (!markerParams.length) return;
      const mapUrl = `https://maps.googleapis.com/maps/api/staticmap?size=220x220&scale=2&maptype=roadmap&style=feature:all|element:labels|visibility:simplified&${markerParams.join("&")}&key=${mapsKey}`;
      const mapImg = document.getElementById("post-map-img");
      mapImg.src = mapUrl;
      mapImg.onload = () => { document.getElementById("post-map-wrap").style.display = "block"; };
    })
    .catch(() => {});
  }

  // ── AI Caption via Gemini ─────────────────────────────────────────────────
  let generatedCaption = "";

  async function generateCaption() {
    const captionEl = document.getElementById("caption-text");
    captionEl.innerHTML = '<span class="caption-generating"><span class="spinner"></span>Writing caption with AI…</span>';

    const durLabel = duration.split("·")[0].trim();
    const prompt = `You are writing Instagram content for TripCopycat — a platform publishing verified, user-tested travel itineraries. Voice: a well-traveled manager who cuts through noise and gives the logical, tested path. "Manager's Guide" not "travel blog."

Trip details:
- Destination: ${dest}
- Duration: ${duration}
- What they loved: ${quote}
- Featured venues: ${featured.join(", ") || "not specified"}
- What they would skip: ${doNext || "not specified"}

Output TWO sections separated by exactly "---COMMENT---" on its own line:

SECTION 1 — INSTAGRAM CAPTION:
Use ONE hook framework:
1. "Anti-Tourist" — calls out over-tourism, positions this as the smarter alternative
2. "Logic Play" — emphasizes user-tested, verified value
3. "Cheat Code" — gamifies the trip as an insider shortcut

Format:
[HOOK — 1 punchy line]

[2-3 sentences Manager's Memo — why this trip, why now, what makes it different]

✈️ Copy the full ${durLabel} blueprint at tripcopycat.com 🔗 [Link in Bio]

End caption with ONLY these 3 tags: #TripCopycat #ActuallyTraveled #${cityOnly.replace(/\s+/g, "")}

---COMMENT---

SECTION 2 — FIRST COMMENT (posted immediately after, keeps caption clean):
Write ONLY hashtags, no other text. Use this exact tiered stack:

Brand: #TripCopycat #ActuallyTraveled #VerifiedPath
High Intent: #TravelBlueprint #TravelItinerary #TripPlanning #TravelCheatCode #ItineraryLogic
Niche: #ProfessionalTraveler #CuratedTravel #SmartLuxury (+ #CoupleTravel OR #FamilyTravel OR #SoloTravel based on trip)
Destination: #${cityOnly.replace(/\s+/g, "")} #${cityOnly.replace(/\s+/g, "")}Travel (+ neighborhood or region if relevant)
Trend: #DestinationDupe #AntiAlgorithm #HumanVetted #OffTheBeatenPath (choose 2 most relevant)

Total: 12-15 hashtags. No sentences, no explanation — hashtags only.
Do NOT use: #Travel #Wanderlust #Instagood #InstaTravel`;

    if (!geminiKey) {
      console.warn("Instagram template: no geminiKey param — using fallback caption");
      captionEl.textContent = fallbackCaption();
      generatedCaption = captionEl.textContent;
      const fbComment = document.getElementById("comment-text");
      if (fbComment) fbComment.textContent = fallbackComment();
      return;
    }
    try {
      const model = "gemini-2.0-flash";
      const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${geminiKey}`;
      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: { maxOutputTokens: 400 }
        })
      });
      const data = await res.json();
      console.log("Gemini response status:", res.status, "data:", JSON.stringify(data).slice(0, 200));
      if (!res.ok) {
        console.error("Gemini error:", data?.error?.message || res.status);
        captionEl.textContent = fallbackCaption();
        generatedCaption = captionEl.textContent;
        const errComment = document.getElementById("comment-text");
        if (errComment) errComment.textContent = fallbackComment();
        return;
      }
      const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
      if (text) {
        const parts = text.split("---COMMENT---");
        generatedCaption = parts[0].trim();
        captionEl.textContent = generatedCaption;
        const commentEl = document.getElementById("comment-text");
        if (commentEl) commentEl.textContent = parts[1] ? parts[1].trim() : fallbackComment();
      } else {
        captionEl.textContent = fallbackCaption();
        generatedCaption = captionEl.textContent;
        const commentEl = document.getElementById("comment-text");
        if (commentEl) commentEl.textContent = fallbackComment();
      }
    } catch(e) {
      console.error("Gemini fetch error:", e.message);
      captionEl.textContent = fallbackCaption();
      generatedCaption = captionEl.textContent;
      const catchComment = document.getElementById("comment-text");
      if (catchComment) catchComment.textContent = fallbackComment();
    }
  }

  function fallbackCaption() {
    const restsLine = featured.length ? `\n\n🍽️ ${featured.join(" · ")}` : "";
    return `Stop guessing your route.\n\n${dest} — ${duration}. Verified by a real traveler, not an algorithm.${quote ? `\n\n"${trimQuote(quote, 180)}"` : ""}${restsLine}\n\n✈️ Copy the full ${duration.split("·")[0].trim() || ""} blueprint at tripcopycat.com 🔗 [Link in Bio]\n\n#TripCopycat #ActuallyTraveled #${cityOnly.replace(/\s+/g, "")}`;
  }

  function fallbackComment() {
    const city = cityOnly.replace(/\s+/g, "");
    return `#TripCopycat #ActuallyTraveled #VerifiedPath\n#TravelBlueprint #TravelItinerary #TripPlanning #TravelCheatCode #ItineraryLogic\n#ProfessionalTraveler #CuratedTravel #SmartLuxury\n#${city} #${city}Travel\n#DestinationDupe #AntiAlgorithm #HumanVetted #OffTheBeatenPath`;
  }

  function copyCaption() {
    const text = generatedCaption || document.getElementById("caption-text").textContent;
    navigator.clipboard.writeText(text).then(() => {
      const fb = document.getElementById("copy-feedback");
      fb.style.display = "block";
      setTimeout(() => { fb.style.display = "none"; }, 2500);
    }).catch(() => {
      const ta = document.createElement("textarea");
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
    });
  }

  function copyComment() {
    const text = document.getElementById("comment-text").textContent;
    navigator.clipboard.writeText(text).then(() => {
      const fb = document.getElementById("comment-feedback");
      fb.style.display = "block";
      setTimeout(() => { fb.style.display = "none"; }, 2500);
    }).catch(() => {
      const ta = document.createElement("textarea");
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
    });
  }

  // ── Download via html2canvas ──────────────────────────────────────────────
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

  // Logo uses PNG (apple-touch-icon) — html2canvas captures raster reliably on iOS
  // No fetch needed — direct src, pre-loaded by browser
  const logoReady = Promise.resolve();

  function downloadCard() {
    const btn = document.querySelector(".btn-download");
    btn.textContent = "Generating…";
    btn.disabled = true;

    const doCapture = async () => {
      await logoReady;
      // Swap logo to proxied URL for html2canvas capture
      const logoEl = document.getElementById("logo-img");
      const originalLogoSrc = logoEl ? logoEl.src : null;
      if (logoEl) logoEl.src = `/api/image?url=${encodeURIComponent("https://www.tripcopycat.com/apple-touch-icon.png")}`;
      const bgEl = document.getElementById("post-bg");
      const originalBg = bgEl.style.backgroundImage;
      if (photoProxied && photo) {
        bgEl.style.backgroundImage = `url("${photoProxied}")`;
      }
      setTimeout(() => {
        html2canvas(document.getElementById("post-card"), {
          useCORS: true,
          allowTaint: false,
          scale: 2,
          logging: false,
        }).then(canvas => {
          bgEl.style.backgroundImage = originalBg;
          if (logoEl && originalLogoSrc) logoEl.src = originalLogoSrc;
          const dataUrl = canvas.toDataURL("image/png");

          if (isIOS) {
            // iOS Safari can't trigger file downloads — show image for long-press save
            const overlay = document.createElement("div");
            overlay.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px";
            const instruction = document.createElement("p");
            instruction.style.cssText = "color:#FAF7F2;font-size:15px;font-weight:700;margin:0 0 16px;text-align:center;font-family:Inter,sans-serif";
            instruction.textContent = "Press and hold the image → Save to Photos";
            const img = document.createElement("img");
            img.src = dataUrl;
            img.style.cssText = "max-width:100%;max-height:70vh;border-radius:8px;display:block";
            const closeBtn = document.createElement("button");
            closeBtn.textContent = "Done";
            closeBtn.style.cssText = "margin-top:20px;padding:10px 32px;border-radius:8px;border:none;background:#C4A882;color:#1C2B3A;font-size:14px;font-weight:700;cursor:pointer;font-family:Inter,sans-serif";
            closeBtn.onclick = () => document.body.removeChild(overlay);
            overlay.appendChild(instruction);
            overlay.appendChild(img);
            overlay.appendChild(closeBtn);
            document.body.appendChild(overlay);
          } else {
            // Desktop — trigger normal download
            const a = document.createElement("a");
            a.download = `tripcopycat-${cityOnly.toLowerCase().replace(/\s+/g, "-")}.png`;
            a.href = dataUrl;
            a.click();
          }
          btn.textContent = "⬇ Download Image";
          btn.disabled = false;
        }).catch(() => {
          bgEl.style.backgroundImage = originalBg;
          if (logoEl && originalLogoSrc) logoEl.src = originalLogoSrc;
          btn.textContent = "⬇ Download Image";
          btn.disabled = false;
          alert("Could not generate image — try screenshotting instead.");
        });
      }, 1000);
    };

    if (!window.html2canvas) {
      const s = document.createElement("script");
      s.src = "https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";
      s.onload = doCapture;
      s.onerror = () => { btn.textContent = "⬇ Download Image"; btn.disabled = false; alert("Could not load image library."); };
      document.head.appendChild(s);
    } else { doCapture(); }
  }

  // Auto-generate caption on load
  generateCaption();
</script>
</body>
</html>
